<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <title>Igreja Conectada - Gestão Completa</title>

    <meta
      name="description"
      content="Sistema completo de gestão para igrejas: membros, células, financeiro, ministérios e eventos."
    />
    <meta name="author" content="Igreja Conectada" />

    <!-- PWA Manifest — MUST remain static for Chrome install prompt -->
    <link rel="manifest" href="/manifest.json" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1e3a5f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Igreja" />

    <!-- Favicon -->
    <link id="dynamic-favicon" rel="icon" href="/favicon.ico" />

    <!-- PWA: inject apple-touch-icon BEFORE React loads (iOS Safari) -->
    <script>
      (function () {
        var logo = localStorage.getItem("churchLogo");
        if (logo) {
          var link = document.createElement("link");
          link.rel = "apple-touch-icon";
          link.href = logo + "?v=" + Date.now() + "&ios=true";
          document.head.appendChild(link);
        }
      })();
    </script>

    <!-- Open Graph -->
    <meta property="og:title" content="Igreja Conectada - Gestão Completa" />
    <meta property="og:description" content="Sistema completo de gestão para igrejas" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Igreja Conectada" />
    <meta name="twitter:image" content="/icons/icon-512x512.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
